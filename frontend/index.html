<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fake News Detector</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
transition: background 0.3s, color 0.3s;
}

.dark-mode{
background:#121212;
color:white;
}

.container{
max-width:900px;
}

textarea{
resize:none;
}

.result-card{
transition:all 0.4s ease;
transform:scale(0.9);
opacity:0;
}

.result-card.show{
transform:scale(1);
opacity:1;
}

.real{
background:#d4edda;
border:2px solid #28a745;
}

.fake{
background:#f8d7da;
border:2px solid #dc3545;
}

.spinner{
display:none;
}

.history-item{
font-size:14px;
border-bottom:1px solid #ddd;
padding:6px;
}

.dark-mode .history-item{
border-bottom:1px solid #444;
}

</style>
</head>

<body>

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center">

<h2>📰 Fake News Detector</h2>

<button class="btn btn-outline-secondary" onclick="toggleDarkMode()">🌙 Dark Mode</button>

</div>

<hr>

<textarea id="newsInput" class="form-control" rows="5" placeholder="Paste a news headline or paragraph..."></textarea>

<div class="d-flex justify-content-between mt-2">

<div>
<span id="charCount">0</span> characters |
<span id="wordCount">0</span> words
</div>

<button class="btn btn-primary" onclick="detectNews()">Detect</button>

</div>

<div class="spinner text-center mt-3" id="spinner">

<div class="spinner-border text-primary"></div>
<p>Analyzing news...</p>

</div>

<div id="resultCard" class="card result-card mt-4 p-3 text-center"></div>

<hr>

<h5>History (Last 5)</h5>

<div id="history"></div>

</div>

<script>

/* CHANGE THIS WHEN BACKEND IS DEPLOYED */
const apiURL = "https://fake-news-detector.onrender.com/predict";

let historyList = [];

const textarea = document.getElementById("newsInput");

textarea.addEventListener("input", () => {

const text = textarea.value;

document.getElementById("charCount").innerText = text.length;

document.getElementById("wordCount").innerText =
text.trim()=="" ? 0 : text.trim().split(/\s+/).length;

});

function toggleDarkMode(){
document.body.classList.toggle("dark-mode");
}

async function detectNews(){

const text = textarea.value.trim();
const spinner = document.getElementById("spinner");
const resultCard = document.getElementById("resultCard");

if(text===""){
alert("Please enter some text.");
return;
}

resultCard.classList.remove("show");
spinner.style.display="block";

try{

const response = await fetch(apiURL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text:text})
});

if(!response.ok){
throw new Error("Server error");
}

const data = await response.json();

spinner.style.display="none";

displayResult(data);

addHistory(text,data);

}catch(error){

spinner.style.display="none";

alert("Server unreachable. Please check backend deployment.");

}

}

function displayResult(data){

const resultCard = document.getElementById("resultCard");

const label = data.label;
const confidence = data.confidence;

resultCard.className="card result-card mt-4 p-3 text-center";

if(label==="REAL"){
resultCard.classList.add("real");
}else{
resultCard.classList.add("fake");
}

resultCard.innerHTML = `
<h4>${label}</h4>
<p>Confidence: <b>${confidence}%</b></p>
`;

setTimeout(()=>{
resultCard.classList.add("show");
},100);

}

function addHistory(text,data){

historyList.unshift({
text:text.substring(0,60)+"...",
label:data.label,
confidence:data.confidence
});

if(historyList.length>5){
historyList.pop();
}

renderHistory();

}

function renderHistory(){

const historyDiv = document.getElementById("history");

historyDiv.innerHTML="";

historyList.forEach(item=>{

const div=document.createElement("div");

div.className="history-item";

div.innerHTML = `
<b>${item.label}</b> (${item.confidence}%)
<br>
${item.text}
`;

historyDiv.appendChild(div);

});

}

</script>

</body>
</html>
